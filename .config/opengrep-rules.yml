rules:
  - id: no-wildcard-reexport
    patterns:
      - pattern: export * from "..."
    paths:
      include:
        - src/
    message: Use explicit named exports — no wildcard re-exports
    languages: [typescript]
    severity: ERROR

  - id: no-console
    patterns:
      - pattern: console.$METHOD(...)
    paths:
      include:
        - src/
    message: Libraries must not write to console
    languages: [typescript]
    severity: ERROR

  - id: no-timers
    pattern-either:
      - pattern: setTimeout(...)
      - pattern: setInterval(...)
    paths:
      include:
        - src/
    message: Use AbortSignal.timeout instead of setTimeout/setInterval
    languages: [typescript]
    severity: ERROR

  - id: no-mutable-let-export
    patterns:
      - pattern: export let $X = ...
    paths:
      include:
        - src/
    message: All exports must be const or class declarations — no mutable let exports
    languages: [typescript]
    severity: ERROR

  - id: require-harden-runner-on-ubuntu-latest
    patterns:
      - pattern: |
          runs-on: ubuntu-latest
          ...
          steps:
            - uses: $FIRST_USES
              ...
            - ...
      - metavariable-regex:
          metavariable: $FIRST_USES
          regex: "^(?!step-security/harden-runner@).*"
    paths:
      include:
        - .github/workflows/
    message: >-
      Jobs running on ubuntu-latest must include step-security/harden-runner
      as the first step. Harden Runner is not supported on ubuntu-slim runners.
    languages: [yaml]
    severity: ERROR

  - id: no-harden-runner-on-ubuntu-slim
    patterns:
      - pattern: |
          - uses: $USES
            ...
      - pattern-inside: |
          runs-on: ubuntu-slim
          ...
          steps:
            - ...
      - metavariable-regex:
          metavariable: $USES
          regex: "^step-security/harden-runner@"
    paths:
      include:
        - .github/workflows/
    message: >-
      Do not use step-security/harden-runner on ubuntu-slim runners — it is not
      supported and adds a pointless step.
    languages: [yaml]
    severity: ERROR

  - id: no-tls-bypass
    patterns:
      - pattern: "rejectUnauthorized: false"
    message: Do not disable TLS certificate verification
    languages: [typescript, javascript]
    severity: ERROR

  - id: prototype-pollution-loop
    patterns:
      - pattern-either:
          - pattern: |
              $SMTH = $SMTH[$A]
          - pattern: |
              $SMTH = $SMTH[$A] = ...
          - pattern: |
              $SMTH = $SMTH[$A] && $Z
          - pattern: |
              $SMTH = $SMTH[$A] || $Z
      - pattern-either:
          - pattern-inside: |
              for(...) {
                ...
              }
          - pattern-inside: |
              while(...) {
                ...
              }
          - pattern-inside: |
              $X.forEach(function $NAME(...) {
                ...
              })
      - pattern-not-inside: |
          for(var $A = $S; ...; ...) {...}
      - pattern-not-inside: |
          for($A = $S; ...; ...) {...}
      - pattern-not-inside: |
          $X.forEach(function $NAME($OBJ, $A,...) {...})
      - metavariable-pattern:
          metavariable: $A
          patterns:
            - pattern-not: '"..."'
            - pattern-not: |
                `...${...}...`
            - pattern-not: |
                ($A: float)
    message: >-
      Possible prototype pollution via dynamic property assignment in a loop.
      Use Map, Object.create(null), or validate keys against __proto__/constructor.
    languages: [typescript, javascript]
    severity: WARNING
