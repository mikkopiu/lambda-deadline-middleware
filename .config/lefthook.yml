commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --config .config/.commitlintrc.json --edit {1}

pre-commit:
  commands:
    format:
      run: pnpm exec oxfmt --threads 1 {staged_files}
      stage_fixed: true
      glob: "*.{ts,js,json,json5,jsonc}"
    format-slow:
      run: pnpm exec oxfmt --threads 1 {staged_files}
      stage_fixed: true
      glob: "*.{md,yml,yaml,toml}"
    oxlint:
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
      glob: "*.{ts,js}"
    gitleaks:
      run: scripts/gitleaks.sh protect --staged --no-banner --config .config/.gitleaks.toml
    actionlint:
      glob: ".github/workflows/*.yml"
      run: scripts/actionlint.sh
    shellcheck:
      glob: "scripts/*.sh"
      run: scripts/shellcheck.sh {staged_files}

pre-push:
  commands:
    opengrep:
      run: pnpm run sast:check
    reuse:
      run: >-
        scripts/reuse.sh annotate
        --copyright "lambda-deadline-middleware contributors"
        --license MIT
        --skip-existing
        --fallback-dot-license
        {staged_files}
      stage_fixed: true
