title = "gitleaks config"

[allowlist]
paths = ['''node_modules''', '''dist''', '''pnpm-lock\.yaml''', '''\.config/\.gitleaks\.toml''']

[[rules]]
id = "aws-access-key-id"
description = "AWS Access Key ID"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["aws", "credentials"]

[[rules]]
id = "aws-secret-access-key"
description = "AWS Secret Access Key"
regex = '''(?i)aws_secret_access_key\s*[=:]\s*[A-Za-z0-9/+=]{40}'''
tags = ["aws", "credentials"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey)\s*[=:]\s*['"][A-Za-z0-9]{16,}['"]'''
tags = ["api", "key"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA|DSA|EC|PGP|OPENSSH) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "npm-token"
description = "npm Access Token"
regex = '''(?i)npm_[A-Za-z0-9]{36}'''
tags = ["npm", "token"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36,}'''
tags = ["github", "token"]

[[rules]]
id = "generic-secret"
description = "Generic Secret in env var (quoted)"
regex = '''(?i)(password|secret|token)\s*[=:]\s*['"][^\s'"]{8,}['"]'''
tags = ["secret", "generic"]

[[rules]]
id = "generic-secret-unquoted"
description = "Generic Secret in env var (unquoted)"
regex = '''(?i)(password|secret|token)\s*[=:]\s*[^\s'"]{8,}'''
tags = ["secret", "generic"]

[[rules]]
id = "jwt-token"
description = "JSON Web Token"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
tags = ["jwt", "token"]

[[rules]]
id = "aws-session-token"
description = "AWS Session Token"
regex = '''(?i)aws_session_token\s*[=:]\s*[A-Za-z0-9/+=]{20,}'''
tags = ["aws", "credentials"]
