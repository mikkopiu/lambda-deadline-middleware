name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without publishing"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

env:
  # ubuntu-slim: 1 vCPU, 5 GB RAM — allow Node.js to use most of it
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  check-ci:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      actions: read
    steps:
      - name: Wait for CI to pass on HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          echo "Waiting for CI workflow to succeed on ${sha}..."
          for i in $(seq 1 60); do
            run_json=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${sha}&per_page=1" \
              --jq '.workflow_runs[0] // empty')

            if [ -z "$run_json" ]; then
              echo "Attempt ${i}: no CI run found yet, waiting..."
              sleep 15
              continue
            fi

            status=$(echo "$run_json" | jq -r '.status')
            conclusion=$(echo "$run_json" | jq -r '.conclusion')
            echo "Attempt ${i}: status=${status}, conclusion=${conclusion}"

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI passed!"
                exit 0
              else
                echo "::error::CI finished with conclusion: ${conclusion}"
                exit 1
              fi
            fi

            sleep 15
          done

          echo "::error::Timed out waiting for CI (15 min)"
          exit 1

  release:
    needs: check-ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-slim
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    environment: npm-publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Generate SBOM
        run: pnpm run sbom

      - name: Release
        if: ${{ !inputs.dry-run }}
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (dry run)
        if: ${{ inputs.dry-run }}
        run: pnpm run release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
